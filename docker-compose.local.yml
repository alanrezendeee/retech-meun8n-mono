services:
  control-plane-db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: meun8n_control
      POSTGRES_USER: meun8n
      POSTGRES_PASSWORD: localpassword
      TZ: America/Sao_Paulo
    volumes:
      - control_plane_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U meun8n -d meun8n_control"]
      interval: 10s
      timeout: 5s
      retries: 10
    ports:
      - "5433:5432"

  api:
    build:
      context: ./api
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: postgresql://meun8n:localpassword@control-plane-db:5432/meun8n_control
      RAILWAY_API_TOKEN: ${RAILWAY_API_TOKEN}
      RAILWAY_PROJECT_ID: ${RAILWAY_PROJECT_ID}
      RAILWAY_ENVIRONMENT_ID: ${RAILWAY_ENVIRONMENT_ID}
      N8N_IMAGE: n8nio/n8n:2.13.4
      BASE_DOMAIN: meun8n.theretech.com.br
      PORT: 3000
    depends_on:
      control-plane-db:
        condition: service_healthy

  # Para rodar uma instância n8n local de qualquer cliente:
  # DB_POSTGRESDB_DATABASE=n8n_brbit docker compose --profile client up n8n-local
  n8n-local:
    profiles: ["client"]
    image: n8nio/n8n:2.13.4
    restart: unless-stopped
    ports:
      - "5678:5678"
    environment:
      N8N_HOST: localhost
      N8N_PORT: 5678
      N8N_PROTOCOL: http
      N8N_EDITOR_BASE_URL: http://localhost:5678
      WEBHOOK_URL: http://localhost:5678/
      N8N_ENCRYPTION_KEY: ${N8N_ENCRYPTION_KEY}
      N8N_SECURE_COOKIE: false
      DB_TYPE: postgresdb
      DB_POSTGRESDB_HOST: postgres-local
      DB_POSTGRESDB_PORT: 5432
      DB_POSTGRESDB_DATABASE: ${DB_POSTGRESDB_DATABASE:-n8n_local}
      DB_POSTGRESDB_USER: n8n
      DB_POSTGRESDB_PASSWORD: localpassword
      GENERIC_TIMEZONE: America/Sao_Paulo
      TZ: America/Sao_Paulo
      N8N_RUNNERS_ENABLED: "true"
      N8N_ENFORCE_SETTINGS_FILE_PERMISSIONS: "true"
    depends_on:
      postgres-local:
        condition: service_healthy

  postgres-local:
    profiles: ["client"]
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_POSTGRESDB_DATABASE:-n8n_local}
      POSTGRES_USER: n8n
      POSTGRES_PASSWORD: localpassword
      TZ: America/Sao_Paulo
    volumes:
      - n8n_local_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U n8n"]
      interval: 10s
      timeout: 5s
      retries: 10

volumes:
  control_plane_data:
  n8n_local_data:
